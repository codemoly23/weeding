<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" fill="none">
  <!-- Interlocked Wedding Rings Icon -->
  <!-- Ring 1 left portion (visible, behind ring 2) -->
  <circle cx="18" cy="22" r="13" stroke="#C96B8A" stroke-width="3.2" fill="none"/>
  <!-- Ring 2 (front) -->
  <circle cx="30" cy="22" r="13" stroke="#C96B8A" stroke-width="3.2" fill="none"/>
  <!-- Overlap mask: hide ring1's right arc behind ring2 -->
  <!-- White cover strip for interlocking illusion -->
  <path d="M28 9.5 Q35 14 35 22 Q35 30 28 34.5" stroke="white" stroke-width="3.8" fill="none"/>

  <!-- Small diamond/sparkle above rings -->
  <path d="M24 5 L25.2 7.5 L28 8 L26 10 L26.5 13 L24 11.8 L21.5 13 L22 10 L20 8 L22.8 7.5 Z" fill="#C96B8A" opacity="0.85"/>

  <!-- Wordmark -->
  <text x="52" y="30"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="22"
    font-weight="700"
    fill="#1a0a2e"
    letter-spacing="0.4">Ceremo</text>
  <text x="123" y="30"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="22"
    font-weight="700"
    fill="#C96B8A"
    letter-spacing="0.4">ney</text>
</svg>
